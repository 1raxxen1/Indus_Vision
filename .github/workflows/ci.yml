name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  backend-tests:
    name: Backend tests (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: visonIndus
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: visonIndus.settings
        run: python manage.py test posts.tests

  frontend-build:
    name: Frontend build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
